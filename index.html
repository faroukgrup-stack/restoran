<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farouk Danışmanlık ve İş Grubu | Restoran Yönetim Hesaplama Portalı</title>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0b0c15 0%, #1a1e2f 100%);
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* خلفية متحركة (نفس الصفحة العربية) */
        .bg-ornament {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
        }

        .bg-ornament span {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 2px solid #b8860b;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            filter: blur(2px);
            animation: float 20s infinite ease-in-out;
        }

        .bg-ornament span:nth-child(1) { top: 10%; left: 5%; width: 200px; height: 200px; animation-duration: 25s; }
        .bg-ornament span:nth-child(2) { bottom: 15%; right: 8%; width: 250px; height: 250px; animation-duration: 30s; animation-direction: reverse; }
        .bg-ornament span:nth-child(3) { top: 40%; right: 20%; width: 180px; height: 180px; animation-duration: 22s; }

        @keyframes float {
            0% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(5deg) translateY(-20px); }
            100% { transform: rotate(0deg) translateY(0); }
        }

        /* شاشة الدخول (بنفس التصميم البسيط من العربية) */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 12, 18, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-card {
            background: rgba(20, 25, 45, 0.9);
            border: 1px solid rgba(184, 134, 11, 0.5);
            border-radius: 25px;
            padding: 2rem;
            max-width: 350px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .login-icon {
            font-size: 2.5rem;
            color: #b8860b;
            margin-bottom: 10px;
        }

        .login-card h2 {
            color: white;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .login-card p {
            color: #aab4d4;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .password-field {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #b8860b;
            border-radius: 12px;
            color: white;
            text-align: left;
            font-size: 1rem;
            direction: ltr;
        }

        .password-field:focus {
            outline: none;
            border-color: #ffd966;
            box-shadow: 0 0 0 3px rgba(184,134,11,0.3);
        }

        .login-btn {
            width: 100%;
            padding: 0.8rem;
            background: #b8860b;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #d4a017;
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .whatsapp-link {
            display: block;
            margin-top: 15px;
            color: #25d366;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .whatsapp-link:hover {
            text-decoration: underline;
            opacity: 0.9;
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        /* لوحة التحكم (بنفس تصميم العربية) */
        .dashboard {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        .top-bar {
            background: rgba(10, 12, 20, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 3px solid #b8860b;
            padding: 0 2rem;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .company-logo {
            height: 50px;
            width: auto;
            max-width: 150px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(184, 134, 11, 0.5));
        }

        .logo-area h1 {
            font-size: 1.2rem;
            color: #fff;
            font-weight: 700;
            line-height: 1.4;
        }

        .logo-area h1 span {
            color: #b8860b;
            display: block;
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .selector-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(184, 134, 11, 0.4);
            border-radius: 50px;
            padding: 0.5rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .selector-container label {
            color: #ddd;
            font-weight: 700;
            font-size: 1rem;
        }

        .selector-container label i {
            color: #b8860b;
            margin-right: 0.5rem;
        }

        #toolSelect {
            background: white;
            border: 2px solid #b8860b;
            border-radius: 40px;
            padding: 0.7rem 2rem;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            min-width: 280px;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 15px rgba(184, 134, 11, 0.3);
        }

        #toolSelect:hover {
            border-color: #ffd966;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #fff;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            border: 1px solid rgba(184,134,11,0.3);
            margin-right: 1rem;
        }
        .user-info i {
            color: #b8860b;
            margin-right: 0.3rem;
        }

        .logout-btn {
            background: none;
            border: 1px solid #b8860b;
            color: #b8860b;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #b8860b;
            color: white;
        }

        #content-viewer {
            width: 100%;
            flex: 1;
            border: none;
            background: #f4f7fc;
        }

        .loading-overlay {
            position: absolute;
            top: 80px;
            left: 0;
            width: 100%;
            height: calc(100% - 80px);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 500;
            font-weight: 900;
            color: #b8860b;
            font-size: 2rem;
            flex-direction: column;
            gap: 1rem;
        }

        .loading-overlay i {
            font-size: 3rem;
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 800px) {
            .top-bar {
                flex-direction: column;
                height: auto;
                padding: 1rem;
            }
            .selector-container {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }
            #toolSelect {
                min-width: 200px;
            }
            .login-card {
                padding: 2rem 1.5rem;
            }
            .user-info {
                margin-top: 0.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-ornament">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Giriş Ekranı (Tıpkı Arapça versiyonundaki gibi sade ve küçük) -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-icon"><i class="fas fa-utensils"></i></div>
            <h2>Restoran Yönetim Portalı</h2>
            <p>Lütfen giriş yapın</p>
            <input type="text" id="usernameInput" class="password-field" placeholder="Kullanıcı adı" autofocus>
            <input type="password" id="passwordInput" class="password-field" placeholder="Şifre">
            <button class="login-btn" id="loginBtn">Güvenli Giriş</button>
            <a href="https://wa.me/905550196682" target="_blank" class="whatsapp-link">
                <i class="fab fa-whatsapp"></i> Şifremi unuttum? Tıklayın
            </a>
            <div class="error-msg" id="errorMsg"></div>
        </div>
    </div>

    <!-- Ana Panel -->
    <div class="dashboard" id="dashboard">
        <div class="top-bar">
            <div class="logo-area">
                <img src="https://lh3.googleusercontent.com/d/1e6u-DPTinDJl_Q9wW3QvGgzFbXO_2sXa" 
                     alt="Farouk Grup Logo" 
                     class="company-logo"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <i class="fas fa-chart-pie" style="display: none; color: #b8860b; font-size: 2rem;"></i>
                <h1>Farouk Danışmanlık ve İş Grubu <span>Restoran Yönetim Hesaplayıcıları</span></h1>
            </div>

            <div class="selector-container">
                <label><i class="fas fa-calculator"></i> Araç seçin:</label>
                <select id="toolSelect" onchange="loadTool(this.value)">
                    <option value="tool1.html">💰 Restoran Maliyet Hesaplayıcı</option>
                    <option value="tool2.html">📋 Teknik Fizibilite Çalışması</option>
                    <option value="tool3.html">🛍️ Pazarlama Fizibilite Çalışması</option>
                    <option value="tool4.html">📍 Başabaş Noktası Hesaplayıcı</option>
                    <option value="tool5.html">📈 Nakit Akışı Tablosu</option>
                    <option value="tool6.html">🪪 İşgücü Maliyeti Hesaplayıcı</option>
                    <option value="tool7.html">⚙️ Amortisman Hesaplayıcı</option>
                    <option value="tool8.html">🧾 Gıda Güvenliği Denetimi (HACCP)</option>
                    <option value="tool9.html">🧾 İşletim Prosedürleri Denetimi (SOPs)</option>
                </select>
            </div>

            <div style="display: flex; align-items: center; gap: 1rem;">
                <div class="user-info" id="userInfo">
                    <i class="fas fa-user-tie"></i>
                    <span id="userNameDisplay">...</span>
                    <span id="daysLeftDisplay" style="background: rgba(184,134,11,0.2); padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.8rem;"></span>
                </div>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Çıkış</button>
            </div>
        </div>

        <div id="loader" class="loading-overlay">
            <i class="fas fa-spinner"></i> Araç yükleniyor...
        </div>

        <iframe id="content-viewer" src="tool1.html"></iframe>
    </div>

    <script>
        // Aynı Google Apps Script URL (Arapça ile aynı)
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxM3s6UhTwW31jjePoZQG0OLbXVJwWzaXoggjMf9wtozU-SvsPdDip5NwVgT6dlkeKe-w/exec";

        const loginScreen = document.getElementById('loginScreen');
        const dashboard = document.getElementById('dashboard');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const logoutBtn = document.getElementById('logoutBtn');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const daysLeftDisplay = document.getElementById('daysLeftDisplay');
        const toolSelect = document.getElementById('toolSelect');
        const contentViewer = document.getElementById('content-viewer');
        const loader = document.getElementById('loader');

        // Oturum kontrolü
        function checkSession() {
            if (sessionStorage.getItem('restaurantLoggedIn') === 'true') {
                loginScreen.style.display = 'none';
                dashboard.style.display = 'flex';
                const name = sessionStorage.getItem('restaurantUserName') || 'Yönetici';
                const days = sessionStorage.getItem('restaurantDaysLeft');
                userNameDisplay.textContent = name;
                if (days && days !== 'غير محدد') {
                    daysLeftDisplay.textContent = `Kalan ${days} gün`;
                } else {
                    daysLeftDisplay.textContent = '';
                }
            } else {
                loginScreen.style.display = 'flex';
                dashboard.style.display = 'none';
                if (usernameInput) usernameInput.focus();
            }
        }

        // Giriş denemesi
        async function attemptLogin() {
            const user = usernameInput.value.trim();
            const pass = passwordInput.value.trim();

            if (!user || !pass) {
                errorMsg.textContent = '❌ Kullanıcı adı ve şifre giriniz';
                return;
            }

            loginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Kontrol ediliyor...';
            loginBtn.disabled = true;
            errorMsg.textContent = '';

            try {
                const formData = new FormData();
                formData.append('username', user);
                formData.append('password', pass);

                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.status === 'success') {
                    sessionStorage.setItem('restaurantLoggedIn', 'true');
                    sessionStorage.setItem('restaurantUserName', result.name || user);
                    sessionStorage.setItem('restaurantDaysLeft', result.daysLeft || 'غير محدد');

                    userNameDisplay.textContent = result.name || user;
                    if (result.daysLeft && result.daysLeft !== 'غير محدد') {
                        daysLeftDisplay.textContent = `Kalan ${result.daysLeft} gün`;
                    } else {
                        daysLeftDisplay.textContent = '';
                    }

                    loginScreen.style.display = 'none';
                    dashboard.style.display = 'flex';
                } else {
                    errorMsg.textContent = '❌ ' + (result.message || 'Giriş hatası');
                }
            } catch (error) {
                console.error(error);
                errorMsg.textContent = '❌ Sunucuya bağlanılamadı';
            } finally {
                loginBtn.innerHTML = 'Güvenli Giriş';
                loginBtn.disabled = false;
            }
        }

        // Event listeners
        loginBtn.addEventListener('click', attemptLogin);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') passwordInput.focus();
        });

        // Çıkış
        logoutBtn.addEventListener('click', () => {
            sessionStorage.clear();
            location.reload();
        });

        // Araç yükleme
        function loadTool(fileName) {
            loader.style.display = 'flex';
            contentViewer.src = fileName;

            contentViewer.onload = function() {
                loader.style.display = 'none';
            };

            contentViewer.onerror = function() {
                alert("Hata: " + fileName + " dosyası bulunamadı.");
                loader.style.display = 'none';
            };
        }

        window.loadTool = loadTool;

        // Sayfa yüklendiğinde
        window.onload = checkSession;
    </script>

</body>
</html>
