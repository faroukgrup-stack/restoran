<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farouk Danışmanlık ve İş Grubu | Restoran Yönetimi Hesaplama Portalı | Güvenli Giriş</title>
    <link rel="manifest" href="manifest.json">

<script>
  // تسجيل الـ Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0b0c15 0%, #1a1e2f 100%);
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Hareketli altın şekilli arka plan */
        .bg-ornament {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
        }

        .bg-ornament span {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 2px solid #b8860b;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            filter: blur(2px);
            animation: float 20s infinite ease-in-out;
        }

        .bg-ornament span:nth-child(1) { top: 10%; left: 5%; width: 200px; height: 200px; animation-duration: 25s; }
        .bg-ornament span:nth-child(2) { bottom: 15%; right: 8%; width: 250px; height: 250px; animation-duration: 30s; animation-direction: reverse; }
        .bg-ornament span:nth-child(3) { top: 40%; right: 20%; width: 180px; height: 180px; animation-duration: 22s; }

        @keyframes float {
            0% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(5deg) translateY(-20px); }
            100% { transform: rotate(0deg) translateY(0); }
        }

        /* Giriş ekranı */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 12, 18, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.4s ease;
        }

        .login-card {
            background: rgba(20, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(184, 134, 11, 0.5);
            border-radius: 60px;
            padding: 3rem 2.5rem;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 30px rgba(184, 134, 11, 0.4);
            animation: glowPulse 3s infinite alternate;
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 30px rgba(184, 134, 11, 0.3); }
            100% { box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9), 0 0 60px rgba(184, 134, 11, 0.7); }
        }

        .login-icon {
            font-size: 5rem;
            background: linear-gradient(145deg, #b8860b, #f5d742);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 20px #b8860b);
        }

        .login-card h2 {
            font-size: 2.3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f3e9c0, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .login-card p {
            color: #aab4d4;
            margin-bottom: 2.5rem;
            font-size: 1.2rem;
        }

        .password-field {
            width: 100%;
            padding: 1.2rem 1.5rem;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #b8860b;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-size: 1.4rem;
            color: white;
            text-align: center;
            letter-spacing: 10px;
            direction: ltr;
            margin-bottom: 2rem;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(184, 134, 11, 0.3);
        }

        .password-field:focus {
            outline: none;
            border-color: #ffd966;
            box-shadow: 0 0 30px #b8860b;
            background: rgba(0, 0, 0, 0.6);
        }

        .login-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(145deg, #b8860b, #e6b422);
            border: none;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: #111;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .login-btn:hover {
            background: linear-gradient(145deg, #e6b422, #ffd966);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(184, 134, 11, 0.7);
            color: #000;
        }

        .error-msg {
            color: #ff8a8a;
            margin-top: 1.2rem;
            font-weight: 700;
            min-height: 2rem;
        }

        /* Giriş sonrası ana panel */
        .dashboard {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        .top-bar {
            background: rgba(10, 12, 20, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 3px solid #b8860b;
            padding: 0 2rem;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .company-logo {
            height: 50px;
            width: auto;
            max-width: 150px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(184, 134, 11, 0.5));
        }

        .logo-area h1 {
            font-size: 1.2rem;
            color: #fff;
            font-weight: 700;
            line-height: 1.4;
        }

        .logo-area h1 span {
            color: #b8860b;
            display: block;
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .selector-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(184, 134, 11, 0.4);
            border-radius: 50px;
            padding: 0.5rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .selector-container label {
            color: #ddd;
            font-weight: 700;
            font-size: 1rem;
        }

        .selector-container label i {
            color: #b8860b;
            margin-right: 0.5rem;
        }

        #toolSelect {
            background: white;
            border: 2px solid #b8860b;
            border-radius: 40px;
            padding: 0.7rem 2rem;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            min-width: 280px;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 15px rgba(184, 134, 11, 0.3);
        }

        #toolSelect:hover {
            border-color: #ffd966;
        }

        /* iframe */
        #content-viewer {
            width: 100%;
            flex: 1;
            border: none;
            background: #f4f7fc;
        }

        .loading-overlay {
            position: absolute;
            top: 80px;
            left: 0;
            width: 100%;
            height: calc(100% - 80px);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 500;
            font-weight: 900;
            color: #b8860b;
            font-size: 2rem;
            flex-direction: column;
            gap: 1rem;
        }

        .loading-overlay i {
            font-size: 3rem;
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Duyarlı tasarım */
        @media (max-width: 800px) {
            .top-bar {
                flex-direction: column;
                height: auto;
                padding: 1rem;
            }
            .selector-container {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }
            #toolSelect {
                min-width: 200px;
            }
            .login-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Dekoratif arka plan şekilleri -->
    <div class="bg-ornament">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Giriş Ekranı -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-icon"><i class="fas fa-lock"></i></div>
            <h2>Restoran Yönetimi Hesaplama Portalı</h2>
            <p>Araçlara erişim şifresi</p>
            <input type="password" id="passwordInput" class="password-field" placeholder="******" maxlength="6" inputmode="numeric" pattern="\d*" autofocus>
            <button class="login-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Giriş</button>
            <div class="error-msg" id="errorMsg"></div>
        </div>
    </div>

    <!-- Ana İçerik (Giriş başarılı olunca görünür) -->
    <div class="dashboard" id="dashboard">
        <div class="top-bar">
            <div class="logo-area">
                <!-- Logo: PNG şeffaf arka planlı -->
                <img src="https://lh3.googleusercontent.com/d/1e6u-DPTinDJl_Q9wW3QvGgzFbXO_2sXa" 
                     alt="Farouk Grup Logo" 
                     class="company-logo"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <!-- Yedek ikon (görsel yüklenmezse) -->
                <i class="fas fa-chart-pie" style="display: none; color: #b8860b; font-size: 2rem;"></i>
                <h1>Farouk Danışmanlık ve İş Grubu <span>Restoran Yönetimi Hesaplayıcıları</span></h1>
            </div>

            <div class="selector-container">
                <label><i class="fas fa-calculator"></i> Araç seçin:</label>
                <select id="toolSelect" onchange="loadTool(this.value)">
                    <option value="tool1.html">💰 Restoran Maliyet Hesaplayıcı</option>
                    <option value="tool2.html">📋 Teknik Fizibilite Çalışması</option>
                    <option value="tool3.html">🛍️ Pazarlama Fizibilite Çalışması</option>
                    <option value="tool4.html">📍 Başabaş Noktası Hesaplayıcı</option>
                    <option value="tool5.html">📈 Nakit Akışı Tablosu</option>
                    <option value="tool6.html">🪪 İşgücü Maliyeti Hesaplayıcı</option>
                    <option value="tool7.html">⚙️ Amortisman Hesaplayıcı</option>
                    <option value="tool8.html">🧾 Gıda Güvenliği Denetimi (HACCP)</option>
                    <option value="tool9.html">🧾 İşletim Prosedürleri Denetimi (SOPs)</option>
                </select>
            </div>
        </div>

        <div id="loader" class="loading-overlay">
            <i class="fas fa-spinner"></i> Araç yükleniyor...
        </div>

        <iframe id="content-viewer" src="tool1.html"></iframe>
    </div>

    <script>
        // Doğru şifre
        const CORRECT_PASSWORD = "123456";

        const loginScreen = document.getElementById('loginScreen');
        const dashboard = document.getElementById('dashboard');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        function attemptLogin() {
            const entered = passwordInput.value.trim();
            if (entered === CORRECT_PASSWORD) {
                loginScreen.style.display = 'none';
                dashboard.style.display = 'flex';
            } else {
                errorMsg.textContent = '❌ Şifre hatalı';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        loginBtn.addEventListener('click', attemptLogin);

        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                attemptLogin();
            }
        });

        // iframe içinde aracı yükleme fonksiyonu
        function loadTool(fileName) {
            const viewer = document.getElementById('content-viewer');
            const loader = document.getElementById('loader');
            
            loader.style.display = 'flex';
            
            viewer.src = fileName;

            viewer.onload = function() {
                loader.style.display = 'none';
            };

            viewer.onerror = function() {
                alert("Hata: " + fileName + " dosyası bulunamadı.\nDosyanın aynı klasörde ve bu adla var olduğundan emin olun.");
                loader.style.display = 'none';
            };
        }

        // Sayfa yüklendiğinde herhangi bir işlem yapma (giriş bekleniyor)
        window.onload = function() {
            // Başlangıçta boş
        };
    </script>

</body>
</html>
